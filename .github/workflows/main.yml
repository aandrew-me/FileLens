name: Wails build

on:
    workflow_dispatch:
        inputs:
            version:
                description: "Release Tag (e.g. v1.0.0)"
                required: true
                default: "v1.0.0"

env:
    NODE_OPTIONS: "--max-old-space-size=4096"

# Permissions are required to create releases
permissions:
    contents: write

jobs:
    build:
        strategy:
            fail-fast: false
            matrix:
                build:
                    - name: "linux-amd64"
                      platform: "linux/amd64"
                      os: "ubuntu-22.04"
                    - name: "windows-amd64"
                      platform: "windows/amd64"
                      os: "windows-latest"
                    - name: "macos-arm64"
                      platform: "darwin/arm64"
                      os: "macos-latest"
                    - name: "macos-amd64"
                      platform: "darwin/amd64"
                      os: "macos-15-intel"

        runs-on: ${{ matrix.build.os }}
        steps:
            - name: Checkout
              uses: actions/checkout@v4
              with:
                  submodules: recursive

            - name: Setup Go
              uses: actions/setup-go@v5
              with:
                  go-version: "1.21"

            - name: Setup Node
              uses: actions/setup-node@v4
              with:
                  node-version: 18

            - name: Install Linux Dependencies
              if: runner.os == 'Linux'
              run: |
                  sudo apt-get update
                  sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.0-dev

            - name: Install Wails
              run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

            - name: Build App
              shell: bash
              run: |
                  # Build with size optimizations (-s -w)
                  wails build -platform ${{ matrix.build.platform }} -ldflags "-s -w"

            # We need to rename/compress the files so they have unique names in the Release
            - name: Package Application
              shell: bash
              run: |
                  cd build/bin

                  # Define the output name based on the matrix
                  OUTPUT_NAME="FileLens-${{ matrix.build.name }}"

                  if [ "${{ runner.os }}" == "Windows" ]; then
                    # For Windows, rename .exe and zip it
                    mv *.exe "${OUTPUT_NAME}.exe"
                    7z a "../${OUTPUT_NAME}.zip" "${OUTPUT_NAME}.exe"
                  elif [ "${{ runner.os }}" == "macOS" ]; then
                    # For macOS, we must zip the .app bundle
                    # Find the .app folder name
                    APP_NAME=$(find . -maxdepth 1 -name "*.app" -type d -exec basename {} \;)
                    tar -czf "../${OUTPUT_NAME}.tar.gz" "$APP_NAME"
                  else
                    # For Linux, rename binary and tar.gz it
                    # Assuming the binary has no extension
                    mv * "${OUTPUT_NAME}" || true 
                    tar -czf "../${OUTPUT_NAME}.tar.gz" "${OUTPUT_NAME}"
                  fi

            - name: Upload Artifact
              uses: actions/upload-artifact@v4
              with:
                  name: artifact-${{ matrix.build.name }}
                  path: build/*.zip
                  if-no-files-found: ignore # Because Linux/Mac use tar.gz

            - name: Upload Artifact (Tar)
              uses: actions/upload-artifact@v4
              with:
                  name: artifact-${{ matrix.build.name }}-tar
                  path: build/*.tar.gz
                  if-no-files-found: ignore

    release:
        needs: build
        runs-on: ubuntu-latest
        steps:
            - name: Download Artifacts
              uses: actions/download-artifact@v4
              with:
                  pattern: artifact-*
                  merge-multiple: true
                  path: dist

            - name: Create Draft Release
              uses: softprops/action-gh-release@v2
              with:
                  files: dist/*
                  draft: true
                  tag_name: ${{ inputs.version }}
                  name: Release ${{ inputs.version }}
                  generate_release_notes: true
